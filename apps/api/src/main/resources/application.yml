server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

spring:
  main:
    lazy-initialization: ${SPRING_MAIN_LAZY_INITIALIZATION:true}
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:h2:file:./data/han-studio;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:sa}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
