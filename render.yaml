databases:
  - name: han-studio-db
    plan: free
    databaseName: han_studio
    user: han_studio

services:
  - type: web
    name: han-studio-api
    runtime: docker
    plan: free
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://web-seven-iota-63.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: han-studio-db
          property: jdbcConnectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: han-studio-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: han-studio-db
          property: password
