databases:
  - name: han-studio-db
    plan: free
    databaseName: han_studio
    user: han_studio

services:
  - type: web
    name: han-studio-api
    runtime: docker
    plan: free
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://web-seven-iota-63.vercel.app
      - key: DB_HOST
        fromDatabase:
          name: han-studio-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: han-studio-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: han-studio-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: han-studio-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: han-studio-db
          property: password
      - key: SPRING_JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.PostgreSQLDialect
