databases:
  - name: han-studio-db
    plan: free
    databaseName: han_studio
    user: han_studio

services:
  - type: web
    name: han-studio-api
    runtime: docker
    rootDir: apps/api
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://web-seven-iota-63.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: han-studio-db
          property: connectionString
